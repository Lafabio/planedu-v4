<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PlanEdu V5</title>

<link rel="stylesheet"
href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- LOGIN -->

<div class="container"
id="loginBox">

  <div class="logo">

    <h1>
      📚 PlanEdu V5
    </h1>

    <p>
      Plataforma Institucional SESI
    </p>

  </div>

  <div class="field">

    <label>
      E-mail institucional
    </label>

    <input
    type="email"
    id="email">

  </div>

  <div class="field">

    <label>
      Senha
    </label>

    <input
    type="password"
    id="senha">

  </div>

  <button onclick="login()">
    Entrar
  </button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

  <aside class="sidebar">

    <h2>
      📚 PlanEdu
    </h2>

    <div class="menu">

      <button>
        🏠 Dashboard
      </button>

      <button>
        📝 Planejamentos
      </button>

      <button id="coordBtn">

        📋 Coordenação

      </button>

      <button id="adminBtn">

        ⚙️ Administração

      </button>

      <button onclick="logout()">

        🚪 Sair

      </button>

    </div>

  </aside>

  <main class="main">

    <div class="topbar">

      <div>

        <h1 id="titulo">
          Dashboard
        </h1>

        <p id="subtitulo">

          Bem-vindo

        </p>

      </div>

    </div>

    <div class="cards">

      <div class="card">

        <h3>
          Planejamentos
        </h3>

        <div class="big"
        id="totalPlanejamentos">

          0

        </div>

      </div>

      <div class="card">

        <h3>
          Usuários
        </h3>

        <div class="big"
        id="totalUsuarios">

          3

        </div>

      </div>

      <div class="card">

        <h3>
          Status
        </h3>

        <span class="badge">

          Sistema Online

        </span>

      </div>

    </div>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
